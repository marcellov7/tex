name: Publish to npm

# Publishes to npm on every push to main, but ONLY when the version in
# package.json is new (the publish step is skipped if that version already
# exists on the registry). So: bump the version in package.json -> it ships.

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish if version changed
        uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
